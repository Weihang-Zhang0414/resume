<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="100%" height="100%">
    <defs>
      <linearGradient id="grad-2" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#ec4899" />
        <stop offset="100%" stop-color="#8b5cf6" />
      </linearGradient>
      <radialGradient id="glow" cx="50%" cy="50%" r="50%">
        <stop offset="0%" stop-color="#ffffff" stop-opacity="0.15" />
        <stop offset="100%" stop-color="#ffffff" stop-opacity="0" />
      </radialGradient>
    </defs>
    
    <!-- Background Gradient -->
    <rect width="800" height="600" fill="url(#grad-2)" />
    
    <!-- Tech Grid Mesh -->
    <path d="M 0,50 L 800,50 M 0,100 L 800,100 M 0,150 L 800,150 M 0,200 L 800,200 M 0,250 L 800,250 M 0,300 L 800,300 M 0,350 L 800,350 M 0,400 L 800,400 M 0,450 L 800,450 M 0,500 L 800,500 M 0,550 L 800,550" stroke="#f43f5e" stroke-width="1" stroke-opacity="0.25" />
    <path d="M 100,0 L 100,600 M 200,0 L 200,600 M 300,0 L 300,600 M 400,0 L 400,600 M 500,0 L 500,600 M 600,0 L 600,600 M 700,0 L 700,600" stroke="#f43f5e" stroke-width="1" stroke-opacity="0.25" />
    
    <!-- Center Glow -->
    <circle cx="400" cy="300" r="280" fill="url(#glow)" />
    
    <!-- Decorative Tech HUD Elements -->
    <circle cx="400" cy="300" r="200" fill="none" stroke="#ffffff" stroke-width="2" stroke-opacity="0.2" stroke-dasharray="10 15 5 10" />
    <circle cx="400" cy="300" r="220" fill="none" stroke="#ffffff" stroke-width="1" stroke-opacity="0.15" />
    <rect x="50" y="50" width="700" height="500" rx="15" fill="none" stroke="#ffffff" stroke-width="1.5" stroke-opacity="0.25" />
    
    <!-- Decorative Corners -->
    <path d="M 45,70 L 45,45 L 70,45" fill="none" stroke="#ffffff" stroke-width="4" stroke-opacity="0.6" />
    <path d="M 755,70 L 755,45 L 730,45" fill="none" stroke="#ffffff" stroke-width="4" stroke-opacity="0.6" />
    <path d="M 45,530 L 45,555 L 70,555" fill="none" stroke="#ffffff" stroke-width="4" stroke-opacity="0.6" />
    <path d="M 755,530 L 755,555 L 730,555" fill="none" stroke="#ffffff" stroke-width="4" stroke-opacity="0.6" />
    
    <!-- Title Text -->
    <text x="400" y="270" font-family="system-ui, -apple-system, sans-serif" font-size="28" font-weight="bold" fill="#ffffff" text-anchor="middle" letter-spacing="1">
      ARDUINO-BASED SMART CAR
    </text>
    
    <!-- Badge / Label -->
    <rect x="300" y="320" width="200" height="36" rx="18" fill="#0f172a" fill-opacity="0.6" stroke="#ffffff" stroke-width="1" stroke-opacity="0.3" />
    <text x="400" y="343" font-family="monospace" font-size="14" font-weight="bold" fill="#38bdf8" text-anchor="middle" letter-spacing="2">
      PROJECT PREVIEW 02
    </text>
    
    <!-- Interactive hint -->
    <text x="400" y="520" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#ffffff" fill-opacity="0.5" text-anchor="middle" letter-spacing="1">
      Placeholder Image • Double click avatar for Admin edit
    </text>
  </svg>